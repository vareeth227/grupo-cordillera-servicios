version: '3.8'

# Docker Compose optimizado para t3.micro de AWS
# IMPORTANTE: t3.micro tiene solo 1GB RAM, por lo que:
# - Solo puedes correr 2-3 servicios a la vez
# - PostgreSQL consume ~250MB
# - Cada microservicio consume 128-256MB
# 
# Opciones:
# 1. RDS PostgreSQL externo (recomendado)
# 2. Ejecutar servicios en rotation
# 3. Usar ElastiCache para caché

services:
  # PostgreSQL Database - Base de datos centralizada (ultra optimizada)
  postgres:
    image: postgres:16-alpine
    container_name: postgres-cordillera
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      # Configuración ultra-mínima para t3.micro (máximo 200MB)
      POSTGRES_INITDB_ARGS: "-c shared_buffers=32MB -c max_connections=30 -c effective_cache_size=64MB -c work_mem=2048kB -c maintenance_work_mem=16MB"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    networks:
      - cordillera-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 30s
      timeout: 5s
      retries: 2
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '0.3'
          memory: 200M
        reservations:
          cpus: '0.15'
          memory: 100M
    logging:
      driver: "json-file"
      options:
        max-size: "3m"
        max-file: "1"

  # API Gateway (ultra optimizado)
  api-gateway:
    build:
      context: ./api-gateway
      dockerfile: Dockerfile.optimized
    image: cordillera/api-gateway:latest
    container_name: api-gateway
    environment:
      SERVER_PORT: 9090
      SPRING_PROFILES_ACTIVE: production
      SPRING_LOGGING_LEVEL_ROOT: ERROR
      SPRING_JPA_SHOW_SQL: "false"
      MANAGEMENT_ENDPOINTS_WEB_EXPOSURE_INCLUDE: health
      # JVM ultra-optimizado para t3.micro
      JAVA_TOOL_OPTIONS: "-Xms40m -Xmx80m -XX:+UseG1GC -XX:MaxGCPauseMillis=200 -XX:+AlwaysPreTouch"
    ports:
      - "9090:9090"
    networks:
      - cordillera-net
    depends_on:
      postgres:
        condition: service_healthy
      ms-clientes:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:9090/actuator/health"]
      interval: 60s
      timeout: 10s
      start_period: 60s
      retries: 2
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '0.3'
          memory: 160M
        reservations:
          cpus: '0.15'
          memory: 80M
    logging:
      driver: "json-file"
      options:
        max-size: "3m"
        max-file: "1"

  # Microservicio de Clientes (ESENCIAL - mantener activo)
  ms-clientes:
    build:
      context: ./ms-clientes
      dockerfile: Dockerfile.optimized
    image: cordillera/ms-clientes:latest
    container_name: ms-clientes
    environment:
      SERVER_PORT: 9095
      SPRING_PROFILES_ACTIVE: production
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/db_clientes
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER:-postgres}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD:-cordillera2024}
      SPRING_DATASOURCE_HIKARI_MAXIMUM_POOL_SIZE: 3
      SPRING_DATASOURCE_HIKARI_MINIMUM_IDLE: 1
      SPRING_JPA_HIBERNATE_DDL_AUTO: validate
      JWT_SECRET: ${JWT_SECRET:-cordillera-jwt-secret-2024}
      SPRING_LOGGING_LEVEL_ROOT: ERROR
      SPRING_JPA_SHOW_SQL: "false"
      MANAGEMENT_ENDPOINTS_WEB_EXPOSURE_INCLUDE: health
      JAVA_TOOL_OPTIONS: "-Xms48m -Xmx96m -XX:+UseG1GC -XX:MaxGCPauseMillis=200"
    ports:
      - "9095:9095"
    networks:
      - cordillera-net
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:9095/actuator/health"]
      interval: 45s
      timeout: 10s
      start_period: 60s
      retries: 2
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '0.4'
          memory: 192M
        reservations:
          cpus: '0.2'
          memory: 96M
    logging:
      driver: "json-file"
      options:
        max-size: "3m"
        max-file: "1"


networks:
  cordillera-net:
    driver: bridge

volumes:
  postgres_data:
    driver: local
