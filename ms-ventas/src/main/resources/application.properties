# Configuración del servidor
server.port=${SERVER_PORT:9091}
spring.application.name=ms-ventas

# Configuración de base de datos PostgreSQL
# Las credenciales se inyectan desde variables de entorno para mayor seguridad
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/db_ventas}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:postgres}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:postgres}
spring.datasource.driver-class-name=org.postgresql.Driver

# Configuración de JPA/Hibernate
# update: actualiza el esquema automáticamente (usar validate en producción)
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Inicialización con datos de prueba (data.sql se ejecuta al arrancar)
# defer-datasource-initialization asegura que JPA cree las tablas ANTES de ejecutar el SQL
spring.sql.init.mode=always
spring.jpa.defer-datasource-initialization=true

# Actuator: exponer endpoints de salud
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=always

# Logging
logging.level.com.grupocordillera.ventas=DEBUG
