server.port=${SERVER_PORT:9095}
spring.application.name=ms-clientes

spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5436/db_clientes}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:postgres}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:postgres}
spring.datasource.driver-class-name=org.postgresql.Driver

# Liquibase gestiona el esquema — Hibernate solo valida
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Liquibase
spring.liquibase.change-log=classpath:db/changelog/db.changelog-master.yaml
spring.liquibase.enabled=true

management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=always

logging.level.com.grupocordillera.clientes=DEBUG

# Eureka Client: registro en el servidor de descubrimiento de servicios
eureka.client.service-url.defaultZone=http://${EUREKA_HOST:localhost}:8761/eureka/
eureka.instance.prefer-ip-address=true
eureka.client.registry-fetch-interval-seconds=10

# Swagger/OpenAPI
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html

# JWT - mismo secreto que el API Gateway (inyectado via JWT_SECRET en Docker)
jwt.secret=${JWT_SECRET:cordillera-jwt-secret-2024-fullstack3-grupo}
jwt.expiration=86400000
