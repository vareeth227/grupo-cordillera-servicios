# Test configuration - H2 In-Memory Database
spring.datasource.url=jdbc:h2:mem:testdb
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# Disable SQL initialization script (data.sql uses PostgreSQL syntax)
spring.sql.init.mode=never

# Disable Liquibase for tests - use Hibernate instead
spring.liquibase.enabled=false

# JPA/Hibernate settings
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false

# JWT Configuration for tests
jwt.secret=test-jwt-secret-key-for-testing-only
