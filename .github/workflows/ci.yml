name: CI — Microservicios

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  test-ms-ventas:
    name: Test ms-ventas
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'
      - name: Compilar y ejecutar tests
        run: mvn -f ms-ventas/pom.xml verify
      - name: Subir reporte JaCoCo
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: jacoco-ms-ventas
          path: ms-ventas/target/site/jacoco/

  test-ms-ecommerce:
    name: Test ms-ecommerce
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
