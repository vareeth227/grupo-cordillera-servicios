name: CI — Microservicios

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-ms-ventas:
    name: Build ms-ventas
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'maven'
      - name: Compilar ms-ventas
        run: mvn -f ms-ventas/pom.xml package -DskipTests

  build-ms-ecommerce:
    name: Build ms-ecommerce
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'maven'
      - name: Compilar ms-ecommerce
        run: mvn -f ms-ecommerce/pom.xml package -DskipTests

  build-ms-inventario:
    name: Build ms-inventario
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'maven'
      - name: Compilar ms-inventario
        run: mvn -f ms-inventario/pom.xml package -DskipTests

  build-ms-financiero:
    name: Build ms-financiero
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'maven'
      - name: Compilar ms-financiero
        run: mvn -f ms-financiero/pom.xml package -DskipTests

  build-ms-clientes:
    name: Build ms-clientes
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'maven'
      - name: Compilar ms-clientes
        run: mvn -f ms-clientes/pom.xml package -DskipTests

  build-api-gateway:
    name: Build api-gateway
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'maven'
      - name: Compilar api-gateway
        run: mvn -f api-gateway/pom.xml package -DskipTests

  resumen:
    name: Todos los servicios OK
    runs-on: ubuntu-latest
    needs:
      - build-ms-ventas
      - build-ms-ecommerce
      - build-ms-inventario
      - build-ms-financiero
      - build-ms-clientes
      - build-api-gateway
    steps:
      - name: Pipeline completado
        run: echo "Todos los microservicios compilaron correctamente."
