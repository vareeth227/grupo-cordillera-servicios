name: Deploy — Backend

on:
  workflow_run:
    workflows: ["CI — Microservicios"]
    types: [completed]
    branches: [main]

jobs:
  build-and-push:
    name: Construir y subir imágenes
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Login a GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build y push ms-ventas
        uses: docker/build-push-action@v5
        with:
          context: ./ms-ventas
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/ms-ventas:latest

      - name: Build y push ms-ecommerce
        uses: docker/build-push-action@v5
        with:
          context: ./ms-ecommerce
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/ms-ecommerce:latest

      - name: Build y push ms-inventario
        uses: docker/build-push-action@v5
        with:
          context: ./ms-inventario
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/ms-inventario:latest

      - name: Build y push ms-financiero
        uses: docker/build-push-action@v5
        with:
          context: ./ms-financiero
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/ms-financiero:latest

      - name: Build y push ms-clientes
        uses: docker/build-push-action@v5
        with:
          context: ./ms-clientes
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/ms-clientes:latest

      - name: Build y push api-gateway
        uses: docker/build-push-action@v5
        with:
          context: ./api-gateway
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/api-gateway:latest

  deploy:
    name: Desplegar en EC2 Backend via SSM
    runs-on: ubuntu-latest
    needs: build-and-push

    steps:
      - name: Configurar credenciales AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Desplegar via SSM
        run: |
          aws ssm send-command \
            --instance-ids "${{ secrets.BACKEND_INSTANCE_ID }}" \
            --document-name "AWS-RunShellScript" \
            --parameters commands='[
              "echo ${{ secrets.GITHUB_TOKEN }} | docker login ghcr.io -u ${{ github.actor }} --password-stdin",
              "cd /home/ec2-user/cordillera",
              "docker-compose pull",
              "docker-compose up -d --remove-orphans",
              "echo Servicios activos:",
              "docker ps --format \"table {{.Names}}\t{{.Status}}\""
            ]' \
            --region "${{ secrets.AWS_REGION }}"
