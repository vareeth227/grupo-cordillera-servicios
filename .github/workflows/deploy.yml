name: CD — Build y publicar imágenes Docker

on:
  push:
    branches: [deploy]

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ghcr.io/${{ github.repository_owner }}

jobs:
  build-and-push:
    name: Build y push — ${{ matrix.service }}
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    strategy:
      matrix:
        service:
          - ms-ventas
          - ms-ecommerce
          - ms-inventario
          - ms-financiero
          - ms-clientes
          - api-gateway

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Login a GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build y push ${{ matrix.service }}
        uses: docker/build-push-action@v5
        with:
          context: ./${{ matrix.service }}
          dockerfile: ./${{ matrix.service }}/Dockerfile
          push: true
          tags: |
            ${{ env.IMAGE_PREFIX }}/${{ matrix.service }}:latest
            ${{ env.IMAGE_PREFIX }}/${{ matrix.service }}:${{ github.sha }}

  deploy-ok:
    name: Imágenes publicadas
    runs-on: ubuntu-latest
    needs: build-and-push
    steps:
      - name: Resumen
        run: |
          echo "Imágenes publicadas en ghcr.io/${{ github.repository_owner }}"
          echo "Tag: latest y ${{ github.sha }}"
          echo ""
          echo "Para usar en otro PC (LAN):"
          echo "  docker pull ghcr.io/${{ github.repository_owner }}/api-gateway:latest"
          echo "  docker-compose up -d"
