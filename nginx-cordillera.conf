# Nginx - Reverse Proxy para API Gateway en EC2
# Coloca en: /etc/nginx/sites-available/cordillera

upstream api_gateway {
    server localhost:9090;
}

# Redirigir HTTP a HTTPS
server {
    listen 80;
    server_name _;
    return 301 https://$host$request_uri;
}

# HTTPS con certificado SSL
server {
    listen 443 ssl http2;
    server_name api.yourdomain.com;

    # Certificados SSL (generar con Let's Encrypt)
    ssl_certificate /etc/letsencrypt/live/api.yourdomain.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.yourdomain.com/privkey.pem;

    # Configuración SSL segura
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;

    # Compresión
    gzip on;
    gzip_types text/plain text/css text/xml text/javascript application/json application/javascript;
    gzip_vary on;

    # Logs
    access_log /var/log/nginx/cordillera-access.log combined;
    error_log /var/log/nginx/cordillera-error.log;

    # Rate limiting (max 100 requests/second por IP)
    limit_req_zone $binary_remote_addr zone=general:10m rate=100r/s;
    limit_req zone=general burst=200 nodelay;

    # Proxy hacia API Gateway
    location / {
        proxy_pass http://api_gateway;
        
        # Headers importantes
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
        
        # Timeouts
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
        
        # Buffering
        proxy_buffering on;
        proxy_buffer_size 4k;
        proxy_buffers 8 4k;
        proxy_busy_buffers_size 8k;
    }

    # Health check
    location /health {
        proxy_pass http://api_gateway/actuator/health;
        access_log off;
    }

    # Healthz para ELB/ALB
    location /healthz {
        proxy_pass http://api_gateway/actuator/health;
        access_log off;
    }
}
